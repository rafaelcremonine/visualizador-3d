<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Visualizador 3D</title>

<!-- PWA / Apple -->
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Visualizador 3D">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="icon" href="./icons/icon-192.png">

<style>
  :root {
    --bg: #0f1117; --panel: rgba(22,25,35,0.85); --border: rgba(255,255,255,0.08);
    --text: #e7e9ee; --muted: #9aa0ac; --accent: #6c8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    touch-action: none;
  }
  #canvas-wrap { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  .toolbar { position: fixed; top: max(16px, env(safe-area-inset-top)); left: 16px; z-index: 10; display: flex; gap: 8px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px; background: var(--panel);
    border: 1px solid var(--border); color: var(--text); padding: 12px 18px; border-radius: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: transform .12s ease, background .2s ease; user-select: none;
  }
  .btn:active { transform: scale(0.96); }
  .btn.primary { background: linear-gradient(180deg,#6c8cff,#5474f0); border-color: rgba(255,255,255,0.2); color:#fff; }
  .btn svg { width: 19px; height: 19px; }

  .info {
    position: fixed; bottom: max(16px, env(safe-area-inset-bottom)); left: 16px; z-index: 10;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; font-size: 12px; color: var(--muted);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); max-width: 260px; line-height: 1.6;
  }
  .info b { color: var(--text); }
  .info .fname { color: var(--accent); font-weight: 600; word-break: break-all; }

  .controls { position: fixed; top: max(16px, env(safe-area-inset-top)); right: 16px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
  .ctl-btn {
    width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
    background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 14px;
    cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: background .2s ease, transform .12s ease;
  }
  .ctl-btn:active { transform: scale(0.93); }
  .ctl-btn svg { width: 22px; height: 22px; }
  .ctl-btn.active { border-color: var(--accent); color: var(--accent); }

  #drop-overlay { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; background: rgba(15,17,23,0.8); backdrop-filter: blur(4px); }
  #drop-overlay.show { display: flex; }
  .drop-card { border: 2px dashed var(--accent); border-radius: 20px; padding: 48px 64px; text-align: center; background: rgba(30,34,48,0.6); }
  .drop-card h2 { font-size: 22px; margin-bottom: 8px; }
  .drop-card p { color: var(--muted); font-size: 14px; }

  #loading { position: fixed; inset: 0; z-index: 40; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: rgba(15,17,23,0.6); }
  #loading.show { display: flex; }
  .spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 13px; }

  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); z-index: 60; background: #3a2130; border: 1px solid #7a3b52; color: #ffd9e3; padding: 12px 18px; border-radius: 12px; font-size: 13px; max-width: 90vw; opacity: 0; transition: transform .3s ease, opacity .3s ease; }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .hidden-input { display: none; }
</style>
</head>
<body>
  <div id="canvas-wrap"></div>

  <div class="toolbar">
    <button class="btn primary" id="load-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Carregar arquivo
    </button>
  </div>

  <div class="controls">
    <button class="ctl-btn" id="reset-btn" title="Recentralizar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
    <button class="ctl-btn active" id="rotate-btn" title="Girar sozinho"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
    <button class="ctl-btn" id="wire-btn" title="Wireframe"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></button>
    <button class="ctl-btn" id="grid-btn" title="Grade"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
  </div>

  <div class="info">
    <div><b>Arquivo:</b> <span class="fname" id="fname">modelo de exemplo</span></div>
    <div style="margin-top:8px">Um dedo pra girar · dois dedos pra zoom e mover</div>
    <div style="margin-top:4px">Abre: GLB, GLTF, OBJ, STL, FBX, PLY</div>
  </div>

  <div id="drop-overlay"><div class="drop-card"><h2>Solte o arquivo aqui</h2><p>GLB · GLTF · OBJ · STL · FBX · PLY</p></div></div>
  <div id="loading"><div class="spinner"></div><p>Carregando modelo…</p></div>
  <div id="toast"></div>
  <input type="file" id="file-input" class="hidden-input" accept=".glb,.gltf,.obj,.stl,.fbx,.ply">

  <script src="./bundle.js"></script>
</body>
</html>

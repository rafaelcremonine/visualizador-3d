<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Visualizador de Skin</title>
<meta name="theme-color" content="#0f1117">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="stylesheet" href="./style.css">
</head>
<body class="viewer">
  <div id="canvas-wrap"></div>

  <div class="topbar">
    <a class="btn" href="./index.html" title="Voltar ao portal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    </a>
    <button class="btn primary" id="load-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Carregar skin
    </button>
    <div class="spacer"></div>
  </div>

  <div class="controls">
    <button class="ctl-btn" id="reset-btn" title="Recentralizar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
    <button class="ctl-btn active" id="rotate-btn" title="Girar sozinho"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
    <button class="ctl-btn" id="smart-btn" title="Modo Minecraft (andar)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5.9 1.1 1 1.8h6c.1-.7.4-1.3 1-1.8A7 7 0 0 0 12 2z"/></svg></button>
  </div>

  <div class="info">
    <div><b>Skin:</b> <span class="fname" id="fname">exemplo</span></div>
    <div style="margin-top:8px">Carregue um PNG de skin (64×64 ou 64×32).</div>
    <div id="smart-hint" style="display:none;margin-top:6px;color:var(--accent)">🧠 Modo Minecraft: o boneco anda!</div>
  </div>

  <div id="drop-overlay"><div class="drop-card"><h2>Solte a skin aqui</h2><p>PNG 64×64 (ou 64×32)</p></div></div>
  <div id="loading"><div class="spinner"></div><p>Montando o boneco…</p></div>
  <div id="toast"></div>
  <input type="file" id="file-input" class="hidden-input" accept="image/png,image/*">

  <script src="./vendor.js"></script>
  <script src="./common.js"></script>
  <script src="./bedrock.js"></script>
  <script src="./app-skin.js"></script>
</body>
</html>

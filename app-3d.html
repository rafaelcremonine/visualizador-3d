<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Visualizador 3D</title>
<meta name="theme-color" content="#0f1117">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="stylesheet" href="./style.css">
</head>
<body class="viewer">
  <div id="canvas-wrap"></div>

  <div class="topbar">
    <a class="btn" href="./index.html" title="Voltar ao portal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
    </a>
    <button class="btn primary" id="load-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Carregar
    </button>
    <div class="spacer"></div>
  </div>

  <div class="controls">
    <button class="ctl-btn" id="reset-btn" title="Recentralizar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
    <button class="ctl-btn active" id="rotate-btn" title="Girar sozinho"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
    <button class="ctl-btn" id="wire-btn" title="Wireframe"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></button>
    <button class="ctl-btn active" id="grid-btn" title="Grade"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
  </div>

  <div class="info">
    <div><b>Arquivo:</b> <span class="fname" id="fname">modelo de exemplo</span></div>
    <div style="margin-top:8px">Um dedo pra girar · dois dedos pra zoom e mover</div>
    <div style="margin-top:4px">Abre: GLB, GLTF, OBJ, STL, FBX, PLY</div>
  </div>

  <div id="drop-overlay"><div class="drop-card"><h2>Solte o arquivo aqui</h2><p>GLB · GLTF · OBJ · STL · FBX · PLY</p></div></div>
  <div id="loading"><div class="spinner"></div><p>Carregando…</p></div>
  <div id="toast"></div>
  <input type="file" id="file-input" class="hidden-input" accept=".glb,.gltf,.obj,.stl,.fbx,.ply">

  <script src="./vendor.js"></script>
  <script src="./common.js"></script>
  <script src="./app-3d.js"></script>
</body>
</html>
